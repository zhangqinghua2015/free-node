name: Convert Subscription

on:
  push:
    paths:
      - 'jcnode.txt'
      - 'QFZYFX_P.txt'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to convert (jcnode or QFZYFX)'
        required: true
        default: 'jcnode'
        type: choice
        options:
          - jcnode
          - QFZYFX

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade requests pyyaml cryptography

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changed channel
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "channel=${{ inputs.channel }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD || true)
            CHANNELS=""
            echo "$CHANGED" | grep -q 'jcnode.txt' && CHANNELS="$CHANNELS jcnode" || true
            echo "$CHANGED" | grep -q 'QFZYFX_P.txt' && CHANNELS="$CHANNELS QFZYFX" || true
            CHANNELS=$(echo $CHANNELS | xargs)
            echo "channels=$CHANNELS" >> $GITHUB_OUTPUT
          fi

      - name: Run conversion
        env:
          CHANNELS: ${{ steps.detect.outputs.channels }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Converting channel: $INPUT_CHANNEL"
            python main.py --convert-only "$INPUT_CHANNEL"
          else
            for ch in $CHANNELS; do
              echo "Converting channel: $ch"
              python main.py --convert-only "$ch"
            done
          fi
